<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Dashboard | Dutabarane</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Professional Loading System CSS -->
    <link rel="stylesheet" href="loaders.css">
    <style>
        /* ================= BLUE-BLACK THEME ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0b0f17;
            color: white;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background with particles */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 158, 255, 0.1) 0%, transparent 50%);
            animation: backgroundPulse 8s ease-in-out infinite;
            z-index: -2;
        }

        /* Floating particles */
        body::after {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 5% 10%, #3b82f6, transparent),
                radial-gradient(2px 2px at 15% 70%, #4a9eff, transparent),
                radial-gradient(3px 3px at 25% 40%, #2a7fff, transparent),
                radial-gradient(2px 2px at 45% 80%, #0066ff, transparent),
                radial-gradient(3px 3px at 65% 20%, #7fabff, transparent),
                radial-gradient(2px 2px at 75% 60%, #3b82f6, transparent),
                radial-gradient(3px 3px at 85% 30%, #4a9eff, transparent),
                radial-gradient(2px 2px at 95% 90%, #2a7fff, transparent);
            background-size: 200% 200%;
            opacity: 0.2;
            animation: floatParticles 25s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        /* ================= LAYOUT ================= */
        h1, h2 {
            color: white;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 0 0 15px #0066ff99;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4a9eff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        .left-section, .right-section {
            flex: 1 1 40%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* ================= CARDS ================= */
        .card {
            background: rgba(5, 12, 24, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(30, 100, 200, 0.3);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 150, 255, 0.2) inset;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #3b82f6;
            box-shadow: 0 25px 50px -12px #000000, 0 0 0 1px #2a7fff66 inset;
        }

        /* ================= INPUTS ================= */
        input, .search {
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            background: rgba(10, 25, 45, 0.6);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, .search:focus {
            border-color: #3b82f6;
            background: rgba(15, 35, 60, 0.8);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }

        input::placeholder, .search::placeholder {
            color: #6688aa;
            opacity: 0.7;
        }

        /* Colored inputs for different data types */
        .amount-input { border-color: #00c853; }
        .loan-input { border-color: #ff9100; }
        .interest-input { border-color: #2979ff; }

        .amount-input:focus { box-shadow: 0 0 15px rgba(0, 200, 83, 0.3); }
        .loan-input:focus { box-shadow: 0 0 15px rgba(255, 145, 0, 0.3); }
        .interest-input:focus { box-shadow: 0 0 15px rgba(41, 121, 255, 0.3); }

        /* ================= BUTTONS ================= */
        button {
            padding: 14px 20px;
            margin: 10px 0;
            width: 100%;
            background: linear-gradient(145deg, #002244, #001433);
            border: 2px solid #2a7fff;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Space Grotesk', sans-serif;
        }

        button:hover {
            background: linear-gradient(145deg, #003366, #001f4d);
            border-color: #4a9eff;
            box-shadow: 0 10px 20px -5px #000000, 0 0 20px #2a7fff;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Small delete button */
        .btn-delete-small {
            width: 36px;
            height: 36px;
            padding: 0;
            background: rgba(255, 68, 68, 0.1);
            border: 2px solid #ff4444;
            border-radius: 8px;
            color: #ff4444;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .btn-delete-small:hover {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
            transform: scale(1.1);
            box-shadow: 0 0 15px #ff4444;
        }

        /* ================= TABLES ================= */
        .table-box, .table-scroll {
            overflow: auto;
            max-height: 350px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 15px;
            scrollbar-width: thin;
            scrollbar-color: #3b82f6 #0a1424;
        }

        .table-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-scroll::-webkit-scrollbar-track {
            background: #0a1424;
            border-radius: 10px;
        }

        .table-scroll::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th, td {
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 12px 10px;
            text-align: center;
        }

        th {
            background: linear-gradient(145deg, #002244, #001433);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 5;
            border-bottom: 2px solid #3b82f6;
            font-family: 'Space Grotesk', sans-serif;
        }

        td {
            background: rgba(0, 0, 0, 0.3);
        }

        tr:hover td {
            background: rgba(59, 130, 246, 0.1);
        }

        /* ================= FILE LIST ================= */
        #fileList {
            list-style: none;
            padding: 0;
        }

        #fileList li {
            padding: 15px;
            margin: 8px 0;
            background: rgba(10, 25, 45, 0.6);
            border: 1px solid #3b82f6;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
        }

        #fileList li:hover {
            background: rgba(20, 40, 70, 0.8);
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
            border-color: #4a9eff;
        }

        .file-name {
            flex: 1;
            cursor: pointer;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .file-name:hover {
            color: #3b82f6;
            text-shadow: 0 0 8px #3b82f6;
        }

        /* ================= POPUP ================= */
        .popup {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-width: 95%;
            background: rgba(5, 12, 24, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid #3b82f6;
            border-radius: 24px;
            display: none;
            z-index: 1000;
            box-shadow: 0 30px 60px -15px #000000, 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .popup.max {
            width: 95%;
            height: 95%;
            top: 2.5%;
        }

        .popup-header {
            background: linear-gradient(145deg, #002244, #001433);
            color: white;
            padding: 15px 20px;
            border-radius: 22px 22px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #3b82f6;
            cursor: move;
        }

        .popup-header span {
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .popup-header span:hover {
            background: rgba(59, 130, 246, 0.3);
            color: #3b82f6;
        }

        .popup-body {
            padding: 25px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* ================= UNDO ================= */
        .undo-box {
            background: rgba(0, 40, 80, 0.9);
            border: 1px solid #3b82f6;
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            text-align: center;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .undo-box button {
            width: auto;
            padding: 8px 20px;
            margin: 0;
            background: linear-gradient(145deg, #002244, #001433);
        }

        /* ================= ANIMATIONS ================= */
        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        @keyframes floatParticles {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* ================= MOBILE ================= */
        @media (max-width: 768px) {
            .container {
                padding: 80px 15px 20px;
            }

            .popup {
                position: fixed;
                top: 0;
                left: 0;
                transform: none;
                width: 100%;
                height: 100%;
                border-radius: 0;
                border: none;
            }

            .popup.max {
                top: 0;
                height: 100%;
            }

            .popup-header {
                border-radius: 0;
                cursor: default;
            }

            .popup-body {
                max-height: calc(100vh - 70px);
                padding: 15px;
            }

            .container {
                flex-direction: column;
            }

            table {
                min-width: 100%;
            }

            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }

            .card { padding: 20px; }

            .btn-delete-small {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
            }

            #fileList li {
                padding: 12px;
            }
        }

        /* Loading state for tables */
        .loading-row td {
            padding: 20px;
            text-align: center;
            color: #6688aa;
        }

        .loading-row i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <!-- Progress Bar (Top) -->
    <div class="progress-bar">
        <div class="progress-bar-fill"></div>
    </div>

    <!-- Page Loader (Initial) -->
    <div class="page-loader">
        <div class="page-loader-content">
            <div class="page-loader-spinner"></div>
            <div class="page-loader-text">Loading Dashboard...</div>
        </div>
    </div>

    <div class="container">
        <h1 style="flex-basis:100%">ADMIN CONTROL PANEL</h1>

        <!-- ================= MEMBERS SECTION ================= -->
        <div class="left-section">
            <div class="card">
                <h2><i class="fas fa-users" style="color: #3b82f6; margin-right: 10px;"></i>Members</h2>
                <input class="search" id="memberSearch" placeholder="Search members..." onkeyup="searchMembers(this.value)">
                <form id="memberForm">
                    <input id="mName" placeholder="Member name" required>
                    <input id="mPhone" placeholder="Phone number" required>
                    <button type="submit" id="addMemberBtn">
                        <i class="fas fa-user-plus"></i> Add Member
                    </button>
                </form>
                <div id="undoArea"></div>
            </div>

            <div class="card">
                <button id="toggleMembers" onclick="toggleMembersTable()" class="toggle-btn">
                    <i class="fas fa-chevron-down"></i> Show Members ▼
                </button>
                <div class="table-scroll" id="membersScroll" style="display: none;">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="members">
                            <tr class="loading-row">
                                <td colspan="3">
                                    <i class="fas fa-spinner fa-spin"></i> Loading members...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ================= FILES SECTION ================= -->
        <div class="right-section">
            <div class="card">
                <h2><i class="fas fa-folder" style="color: #3b82f6; margin-right: 10px;"></i>Files</h2>
                <input class="search" id="fileSearch" placeholder="Search files..." onkeyup="searchFiles(this.value)">
                <form id="fileForm">
                    <input id="fileName" placeholder="File name (e.g., January 2025)" required>
                    <button type="submit" id="createFileBtn">
                        <i class="fas fa-plus-circle"></i> Create File
                    </button>
                </form>
                <button id="toggleFiles" onclick="toggleFilesList()" class="toggle-btn">
                    <i class="fas fa-chevron-down"></i> Show Files ▼
                </button>

                <div class="table-scroll" id="filesScroll" style="display: none;">
                    <ul id="fileList">
                        <li class="loading-row">
                            <i class="fas fa-spinner fa-spin"></i> Loading files...
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= FILE POPUP ================= -->
    <div class="popup" id="filePopup">
        <div class="popup-header" id="popupHeader">
            <b id="currentFile"><i class="fas fa-file-alt" style="margin-right: 8px;"></i> Loading...</b>
            <div>
                <span onclick="minPopup()" title="Minimize">➖</span>
                <span onclick="maxPopup()" title="Maximize">⬜</span>
                <span onclick="closePopup()" title="Close">❌</span>
            </div>
        </div>

        <div class="popup-body">
            <!-- Search member inside opened file -->
            <input class="search" id="fileMemberSearch" placeholder="Search member in file..." onkeyup="searchFileMembers(this.value)">

            <!-- Show/Hide File Members Button -->
            <button id="toggleFileMembers" onclick="toggleFileTable()" class="toggle-btn">
                <i class="fas fa-chevron-down"></i> Show Members ▼
            </button>
            
            <div class="table-scroll" id="fileScroll" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>Member</th>
                            <th>Amount</th>
                            <th>Loan</th>
                            <th>Interest</th>
                        </tr>
                    </thead>
                    <tbody id="fileTable">
                        <tr class="loading-row">
                            <td colspan="4">
                                <i class="fas fa-spinner fa-spin"></i> Loading file data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveFile()" id="saveFileBtn" style="flex: 2;">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <button onclick="deleteFile()" id="deleteFileBtn" style="flex: 1; background: rgba(255,68,68,0.1); border-color: #ff4444; color: #ff4444;">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Professional Loading System JavaScript -->
    <script src="loaders.js"></script>
    
    <script>
        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        const BASE = "/api/";
        let members = [], files = [], currentFileId = null, lastDeleted = null;
        let startY = 0;
        const filePopup = document.getElementById('filePopup');

        // ============================================
        // HIDE PAGE LOADER AFTER PAGE LOADS
        // ============================================
        window.addEventListener('load', function() {
            setTimeout(() => {
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.hidePageLoader();
                }
            }, 800);
        });

        // ============================================
        // TOUCH TO CLOSE POPUP (MOBILE)
        // ============================================
        if (filePopup) {
            filePopup.addEventListener("touchstart", e => {
                startY = e.touches[0].clientY;
            });

            filePopup.addEventListener("touchend", e => {
                const endY = e.changedTouches[0].clientY;
                if (endY - startY > 120) {
                    closePopup();
                }
            });
        }

        // ============================================
        // MEMBERS FUNCTIONS WITH LOADERS
        // ============================================
        async function loadMembers() {
            const membersBody = document.getElementById("members");
            membersBody.innerHTML = `<tr class="loading-row"><td colspan="3"><i class="fas fa-spinner fa-spin"></i> Loading members...</td></tr>`;
            
            if (window.dutabaraneLoader) {
                window.dutabaraneLoader.startProgress();
            }

            try {
                const r = await fetch(BASE + "members");
                members = await r.json();
                renderMembers(members);
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.completeProgress();
                }
            } catch (error) {
                console.error("Error loading members:", error);
                membersBody.innerHTML = `<tr><td colspan="3" style="color: #ff4444;">Error loading members</td></tr>`;
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.completeProgress();
                    window.dutabaraneLoader.showSuccess('Failed to load members', 3000);
                }
            }
        }

        function renderMembers(data) {
            document.getElementById("members").innerHTML = data.map(m => `
                <tr>
                    <td>${m.name}</td>
                    <td>${m.phone}</td>
                    <td><button class="btn-delete-small" onclick="deleteMember(${m.id})" title="Delete member">✕</button></td>
                </tr>
            `).join("");
        }

        function searchMembers(v) {
            renderMembers(members.filter(m => m.name.toLowerCase().includes(v.toLowerCase())));
        }

        async function deleteMember(id) {
            if (!confirm("Are you sure you want to delete this member?")) return;
            
            const deleteBtn = event.target;
            const originalHTML = deleteBtn.innerHTML;
            
            if (window.dutabaraneLoader) {
                deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                deleteBtn.disabled = true;
            }

            lastDeleted = members.find(m => m.id === id);
            
            try {
                await fetch(BASE + "members/" + id, { method: "DELETE" });
                members = members.filter(m => m.id !== id);
                renderMembers(members);
                showUndo();
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Member deleted', 2000);
                }
            } catch (error) {
                console.error("Delete error:", error);
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Delete failed', 3000);
                }
            } finally {
                if (window.dutabaraneLoader) {
                    deleteBtn.innerHTML = originalHTML;
                    deleteBtn.disabled = false;
                }
            }
        }

        function showUndo() {
            const undoArea = document.getElementById("undoArea");
            undoArea.innerHTML = `<div class="undo-box">
                <span>Member deleted</span>
                <button onclick="undoDelete()">UNDO</button>
            </div>`;
            setTimeout(() => undoArea.innerHTML = "", 7000);
        }

        async function undoDelete() {
            if (!lastDeleted) return;
            
            try {
                await fetch(BASE + "members", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(lastDeleted)
                });
                loadMembers();
                document.getElementById("undoArea").innerHTML = "";
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Member restored', 2000);
                }
            } catch (error) {
                console.error("Undo error:", error);
            }
        }

        // ============================================
        // FILES FUNCTIONS WITH LOADERS
        // ============================================
        async function loadFiles() {
            const fileList = document.getElementById("fileList");
            fileList.innerHTML = `<li class="loading-row"><i class="fas fa-spinner fa-spin"></i> Loading files...</li>`;

            try {
                const r = await fetch(BASE + "files");
                files = await r.json();
                
                fileList.innerHTML = files.map(f => `
                    <li>
                        <span class="file-name" onclick="openFile(${f.id},'${f.name.replace(/'/g, "\\'")}')">
                            <i class="fas fa-file" style="color: #3b82f6; margin-right: 8px;"></i>${f.name}
                        </span>
                        <button class="btn-delete-small" onclick="deleteFileList(event,${f.id})" title="Delete file">✕</button>
                    </li>
                `).join("");
            } catch (error) {
                console.error("Error loading files:", error);
                fileList.innerHTML = `<li style="color: #ff4444;">Error loading files</li>`;
            }
        }

        function searchFiles(v) {
            const fileList = document.getElementById("fileList");
            if (!fileList) return;
            
            [...fileList.children].forEach(li => {
                const text = li.innerText.toLowerCase();
                li.style.display = text.includes(v.toLowerCase()) ? "" : "none";
            });
        }

        async function deleteFileList(e, id) {
            e.stopPropagation();
            if (!confirm("Delete this file permanently?")) return;
            
            const btn = e.target;
            const originalHTML = btn.innerHTML;
            
            if (window.dutabaraneLoader) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;
            }

            try {
                await fetch(BASE + "files/" + id, { method: "DELETE" });
                loadFiles();
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('File deleted', 2000);
                }
            } catch (error) {
                console.error("Delete file error:", error);
            } finally {
                if (window.dutabaraneLoader) {
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                }
            }
        }

        // ============================================
        // FILE POPUP FUNCTIONS WITH LOADERS
        // ============================================
        async function openFile(id, name) {
            currentFileId = id;
            document.getElementById("currentFile").innerHTML = `<i class="fas fa-file-alt" style="margin-right: 8px;"></i>${name}`;
            document.getElementById("filePopup").style.display = "block";
            
            const fileTable = document.getElementById("fileTable");
            fileTable.innerHTML = `<tr class="loading-row"><td colspan="4"><i class="fas fa-spinner fa-spin"></i> Loading file data...</td></tr>`;

            if (window.dutabaraneLoader) {
                window.dutabaraneLoader.startProgress();
            }

            try {
                const r = await fetch(BASE + "files/" + id);
                const data = await r.json();

                fileTable.innerHTML = members.map(m => `
                    <tr>
                        <td>${m.name}</td>
                        <td><input class="amount-input" value="${data[m.id]?.amount || ''}" placeholder="Amount"></td>
                        <td><input class="loan-input" value="${data[m.id]?.loan || ''}" placeholder="Loan"></td>
                        <td><input class="interest-input" value="${data[m.id]?.interest || ''}" placeholder="Interest"></td>
                    </tr>
                `).join("");

                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.completeProgress();
                }
            } catch (error) {
                console.error("Error opening file:", error);
                fileTable.innerHTML = `<tr><td colspan="4" style="color: #ff4444;">Error loading file data</td></tr>`;
            }
        }

        function closePopup() {
            document.getElementById("filePopup").style.display = "none";
        }
        
        function minPopup() {
            document.getElementById("filePopup").style.display = "none";
        }
        
        function maxPopup() {
            document.getElementById("filePopup").classList.toggle("max");
        }

        function searchFileMembers(value) {
            value = value.toLowerCase();
            document.querySelectorAll("#fileTable tr").forEach(row => {
                if (row.classList.contains('loading-row')) return;
                const memberName = row.children[0]?.innerText.toLowerCase() || '';
                row.style.display = memberName.includes(value) ? "" : "none";
            });
        }

        // ============================================
        // SAVE FILE WITH LOADER
        // ============================================
        async function saveFile() {
            if (!currentFileId) return;
            
            const saveBtn = document.getElementById('saveFileBtn');
            const originalHTML = saveBtn.innerHTML;
            
            if (window.dutabaraneLoader) {
                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                saveBtn.disabled = true;
                window.dutabaraneLoader.showSavingOverlay('.popup-body', 'Saving file data...');
            }

            const payload = {};
            const rows = document.querySelectorAll("#fileTable tr");
            
            rows.forEach((tr, i) => {
                if (tr.classList.contains('loading-row')) return;
                if (members[i]) {
                    const inputs = tr.querySelectorAll("input");
                    payload[members[i].id] = {
                        amount: inputs[0]?.value || '',
                        loan: inputs[1]?.value || '',
                        interest: inputs[2]?.value || ''
                    };
                }
            });

            try {
                await fetch(BASE + "files/" + currentFileId, {
                    method: "PUT",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.hideSavingOverlay('.popup-body');
                    window.dutabaraneLoader.showSuccess('File saved successfully!', 2000);
                }
            } catch (error) {
                console.error("Save error:", error);
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.hideSavingOverlay('.popup-body');
                    window.dutabaraneLoader.showSuccess('Save failed!', 3000);
                }
            } finally {
                if (window.dutabaraneLoader) {
                    saveBtn.innerHTML = originalHTML;
                    saveBtn.disabled = false;
                }
            }
        }

        // ============================================
        // DELETE FILE
        // ============================================
        async function deleteFile() {
            if (!currentFileId) return;
            if (!confirm("Delete this file permanently?")) return;
            
            const deleteBtn = document.getElementById('deleteFileBtn');
            const originalHTML = deleteBtn.innerHTML;
            
            if (window.dutabaraneLoader) {
                deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                deleteBtn.disabled = true;
            }

            try {
                await fetch(BASE + "files/" + currentFileId, { method: "DELETE" });
                closePopup();
                loadFiles();
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('File deleted', 2000);
                }
            } catch (error) {
                console.error("Delete error:", error);
            } finally {
                if (window.dutabaraneLoader) {
                    deleteBtn.innerHTML = originalHTML;
                    deleteBtn.disabled = false;
                }
            }
        }

        // ============================================
        // DRAG FUNCTIONALITY (DESKTOP ONLY)
        // ============================================
        let drag = false, dx, dy;
        const popupHeader = document.getElementById('popupHeader');
        
        if (window.innerWidth > 768 && popupHeader) {
            popupHeader.onmousedown = e => {
                drag = true;
                dx = e.clientX - filePopup.offsetLeft;
                dy = e.clientY - filePopup.offsetTop;
                filePopup.style.transition = 'none';
            };
            
            document.onmousemove = e => {
                if (drag) {
                    filePopup.style.left = (e.clientX - dx) + "px";
                    filePopup.style.top = (e.clientY - dy) + "px";
                }
            };
            
            document.onmouseup = () => {
                drag = false;
                filePopup.style.transition = 'all 0.3s ease';
            };
        }

        // ============================================
        // FORM SUBMISSIONS WITH LOADERS
        // ============================================
        document.getElementById('memberForm').onsubmit = async e => {
            e.preventDefault();
            
            const name = document.getElementById('mName').value.trim();
            const phone = document.getElementById('mPhone').value.trim();
            
            if (!name || !phone) {
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Please fill all fields', 3000);
                }
                return;
            }

            const submitBtn = document.getElementById('addMemberBtn');
            const originalHTML = submitBtn.innerHTML;
            
            if (window.dutabaraneLoader) {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';
                submitBtn.disabled = true;
            }

            try {
                await fetch(BASE + "members", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone })
                });
                
                e.target.reset();
                await loadMembers();
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Member added successfully!', 2000);
                }
            } catch (error) {
                console.error("Add member error:", error);
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Failed to add member', 3000);
                }
            } finally {
                if (window.dutabaraneLoader) {
                    submitBtn.innerHTML = originalHTML;
                    submitBtn.disabled = false;
                }
            }
        };

        document.getElementById('fileForm').onsubmit = async e => {
            e.preventDefault();
            
            const name = document.getElementById('fileName').value.trim();
            
            if (!name) {
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Please enter file name', 3000);
                }
                return;
            }

            const submitBtn = document.getElementById('createFileBtn');
            const originalHTML = submitBtn.innerHTML;
            
            if (window.dutabaraneLoader) {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
                submitBtn.disabled = true;
            }

            try {
                await fetch(BASE + "files", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                
                e.target.reset();
                await loadFiles();
                
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('File created successfully!', 2000);
                }
            } catch (error) {
                console.error("Create file error:", error);
                if (window.dutabaraneLoader) {
                    window.dutabaraneLoader.showSuccess('Failed to create file', 3000);
                }
            } finally {
                if (window.dutabaraneLoader) {
                    submitBtn.innerHTML = originalHTML;
                    submitBtn.disabled = false;
                }
            }
        };

        // ============================================
        // TOGGLE FUNCTIONS
        // ============================================
        function toggleMembersTable() {
            const tableDiv = document.getElementById("membersScroll");
            const btn = document.getElementById("toggleMembers");
            
            if (tableDiv.style.display === "none" || tableDiv.style.display === "") {
                tableDiv.style.display = "block";
                btn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Members ▲';
            } else {
                tableDiv.style.display = "none";
                btn.innerHTML = '<i class="fas fa-chevron-down"></i> Show Members ▼';
            }
        }

        function toggleFilesList() {
            const listDiv = document.getElementById("filesScroll");
            const btn = document.getElementById("toggleFiles");
            
            if (listDiv.style.display === "none" || listDiv.style.display === "") {
                listDiv.style.display = "block";
                btn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Files ▲';
            } else {
                listDiv.style.display = "none";
                btn.innerHTML = '<i class="fas fa-chevron-down"></i> Show Files ▼';
            }
        }

        function toggleFileTable() {
            const tableDiv = document.getElementById("fileScroll");
            const btn = document.getElementById("toggleFileMembers");
            
            if (tableDiv.style.display === "none" || tableDiv.style.display === "") {
                tableDiv.style.display = "block";
                btn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Members ▲';
            } else {
                tableDiv.style.display = "none";
                btn.innerHTML = '<i class="fas fa-chevron-down"></i> Show Members ▼';
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================
        loadMembers();
        loadFiles();

        console.log('✅ Dashboard loaded with professional loaders');
        console.log('📱 Fully responsive on all devices');
        console.log('✨ All actions have loading feedback');
    </script>
</body>
</html>
