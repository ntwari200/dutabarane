<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login - Internal System | Dutabarane</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Professional Loading System CSS -->
    <link rel="stylesheet" href="loaders.css">
    <style>
        /* Your existing styles - keep them exactly as they were */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0f17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 15px;
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 158, 255, 0.1) 0%, transparent 50%);
            animation: backgroundPulse 8s ease-in-out infinite;
            top: 0;
            left: 0;
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 5% 10%, #3b82f6, transparent),
                radial-gradient(2px 2px at 15% 70%, #4a9eff, transparent),
                radial-gradient(3px 3px at 25% 40%, #2a7fff, transparent),
                radial-gradient(2px 2px at 45% 80%, #0066ff, transparent),
                radial-gradient(3px 3px at 65% 20%, #7fabff, transparent);
            background-size: 200% 200%;
            opacity: 0.2;
            animation: floatParticles 25s linear infinite;
            pointer-events: none;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 10px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.8s ease-out;
        }

        .form-box {
            background: rgba(5, 12, 24, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 150, 255, 0.2) inset;
            border: 1px solid rgba(30, 100, 200, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }

        @media (min-width: 768px) {
            .form-box {
                border-radius: 48px;
                padding: 40px 35px;
            }
        }

        .title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 35px;
            text-shadow: 0 0 15px #0066ff99;
            letter-spacing: 1px;
        }

        @media (min-width: 768px) {
            .title {
                font-size: 2rem;
                margin-bottom: 45px;
            }
        }

        .title u {
            text-decoration-color: #3b82f6;
            text-underline-offset: 8px;
            text-decoration-thickness: 3px;
        }

        #loginForm {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-field {
            position: relative;
            width: 100%;
            margin-bottom: 5px;
        }

        .input-field label {
            display: block;
            color: #99bbee;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-align: left;
            padding-left: 5px;
        }

        @media (min-width: 768px) {
            .input-field label {
                font-size: 0.9rem;
                margin-bottom: 10px;
            }
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 50px 14px 15px;
            font-size: 1rem;
            color: white;
            background: rgba(10, 25, 45, 0.6);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 16px;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .input-wrapper input {
                padding: 16px 55px 16px 18px;
                font-size: 1.1rem;
            }
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            background: rgba(15, 35, 60, 0.8);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .toggle-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #99bbee;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            z-index: 10;
            padding: 5px;
        }

        .toggle-icon:hover {
            color: #3b82f6;
        }

        .toggle-icon.active {
            color: #3b82f6;
            text-shadow: 0 0 8px #3b82f6;
        }

        .encryption-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: #6688aa;
            padding-left: 5px;
            min-height: 20px;
        }

        @media (min-width: 768px) {
            .encryption-indicator {
                font-size: 0.75rem;
                margin-top: 10px;
            }
        }

        .encryption-indicator i {
            font-size: 0.7rem;
        }

        .encryption-indicator.encrypting {
            color: #3b82f6;
        }

        .encryption-indicator.encrypting i {
            color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        .encryption-indicator.encrypted {
            color: #10b981;
        }

        .encryption-indicator.encrypted i {
            color: #10b981;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-btn {
            background: linear-gradient(145deg, #002244, #001433);
            border: 2px solid #2a7fff;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
            padding: 14px 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 0 8px 15px -4px #000000cc, 0 0 12px #2a7fff66;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .login-btn {
                border-radius: 60px;
                font-size: 1.2rem;
                padding: 16px 12px;
                margin-top: 20px;
            }
        }

        .login-btn:hover {
            background: linear-gradient(145deg, #003366, #001f4d);
            border-color: #4a9eff;
            box-shadow: 0 15px 25px -5px #000000, 0 0 25px #2a7fff;
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(2px);
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            min-height: 24px;
            color: #ff6b6b;
        }

        .tornado-branding {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: #6688aa;
            font-size: 0.7rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media (min-width: 768px) {
            .tornado-branding {
                bottom: 20px;
                right: 30px;
                font-size: 0.85rem;
                padding: 8px 15px;
            }
        }

        .tornado-branding:hover {
            opacity: 1;
        }

        .tornado-branding i {
            color: #3b82f6;
            animation: gentleSpin 3s linear infinite;
        }

        @keyframes gentleSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }

        @keyframes floatParticles {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        @media (max-width: 480px) {
            .input-wrapper input {
                font-size: 16px;
                padding: 14px 45px 14px 12px;
            }
            
            .login-btn {
                min-height: 50px;
            }
            
            .toggle-icon {
                right: 12px;
                font-size: 1.1rem;
            }
        }

        .input-wrapper input.error {
            border-color: #ff4444;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <!-- Progress Bar (Top) -->
    <div class="progress-bar">
        <div class="progress-bar-fill"></div>
    </div>

    <!-- Page Loader (Initial) -->
    <div class="page-loader">
        <div class="page-loader-content">
            <div class="page-loader-spinner"></div>
            <div class="page-loader-text">Loading Secure Login...</div>
        </div>
    </div>

    <div class="container">
        <div class="form-box">
            <h2 class="title"><u>INTERNAL SYSTEM</u></h2>

            <form id="loginForm" novalidate>
                <!-- USERNAME FIELD -->
                <div class="input-field">
                    <label for="username">
                        <i class="fas fa-user" style="margin-right: 5px;"></i> Username
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Enter your username" required autocomplete="off">
                        <i class="fas fa-eye toggle-icon" id="toggleUsername" title="Show/Hide Username"></i>
                    </div>
                    <div class="encryption-indicator" id="usernameEncrypt">
                        <i class="fas fa-check-circle"></i>
                        <span>Ready</span>
                    </div>
                </div>

                <!-- PASSWORD FIELD -->
                <div class="input-field">
                    <label for="password">
                        <i class="fas fa-lock" style="margin-right: 5px;"></i> Password
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="off">
                        <i class="fas fa-eye toggle-icon" id="togglePassword" title="Show/Hide Password"></i>
                    </div>
                    <div class="encryption-indicator" id="passwordEncrypt">
                        <i class="fas fa-shield-alt"></i>
                        <span id="encryptText">AES-256 encrypted</span>
                    </div>
                </div>

                <button class="login-btn" type="submit" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i>
                    <span class="btn-text">Login</span>
                </button>
            </form>

            <p id="message"></p>
        </div>
    </div>

    <!-- Tornado Software branding -->
    <div class="tornado-branding">
        <i class="fas fa-bolt"></i> Tornado Software • Secure Login
    </div>

    <!-- Professional Loading System JavaScript -->
    <script src="loaders.js"></script>
    
    <script>
        (function() {
            // ============================================
            // HIDE PAGE LOADER AFTER PAGE LOADS
            // ============================================
            window.addEventListener('load', function() {
                setTimeout(() => {
                    if (window.dutabaraneLoader) {
                        window.dutabaraneLoader.hidePageLoader();
                    }
                }, 800);
            });

            // ============================================
            // ELEMENTS
            // ============================================
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const passwordEncrypt = document.getElementById('passwordEncrypt');
            const encryptText = document.getElementById('encryptText');
            
            const toggleUsername = document.getElementById('toggleUsername');
            const usernameInput = document.getElementById('username');
            const usernameEncrypt = document.getElementById('usernameEncrypt');
            
            const loginForm = document.getElementById('loginForm');
            const loginButton = document.getElementById('loginButton');
            const messageEl = document.getElementById('message');

            // ============================================
            // PASSWORD SHOW/HIDE TOGGLE
            // ============================================
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                    this.classList.toggle('active');
                    
                    if (type === 'text') {
                        encryptText.textContent = 'Visible - not encrypted';
                        passwordEncrypt.className = 'encryption-indicator';
                        passwordEncrypt.querySelector('i').className = 'fas fa-eye';
                    } else {
                        encryptText.textContent = 'AES-256 encrypted';
                        passwordEncrypt.className = 'encryption-indicator encrypted';
                        passwordEncrypt.querySelector('i').className = 'fas fa-shield-alt';
                    }
                });
            }

            // ============================================
            // USERNAME SHOW/HIDE TOGGLE
            // ============================================
            if (toggleUsername && usernameInput) {
                toggleUsername.addEventListener('click', function() {
                    const type = usernameInput.getAttribute('type') === 'text' ? 'password' : 'text';
                    usernameInput.setAttribute('type', type);
                    
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                    this.classList.toggle('active');
                    
                    if (type === 'password') {
                        usernameEncrypt.innerHTML = '<i class="fas fa-eye-slash"></i><span>Hidden</span>';
                    } else {
                        usernameEncrypt.innerHTML = '<i class="fas fa-eye"></i><span>Visible</span>';
                    }
                });
            }

            // ============================================
            // REAL-TIME ENCRYPTION SIMULATION
            // ============================================
            if (passwordInput && passwordEncrypt) {
                passwordInput.addEventListener('input', function() {
                    const value = this.value;
                    
                    if (value.length === 0) {
                        passwordEncrypt.className = 'encryption-indicator';
                        passwordEncrypt.innerHTML = '<i class="fas fa-shield-alt"></i><span>AES-256 encrypted</span>';
                    } else if (value.length < 3) {
                        passwordEncrypt.className = 'encryption-indicator encrypting';
                        passwordEncrypt.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Encrypting...</span>';
                    } else {
                        passwordEncrypt.className = 'encryption-indicator encrypted';
                        passwordEncrypt.innerHTML = '<i class="fas fa-check-circle"></i><span>Secured with AES-256</span>';
                    }
                });
            }

            if (usernameInput && usernameEncrypt) {
                usernameInput.addEventListener('input', function() {
                    const value = this.value;
                    
                    if (value.length > 0) {
                        usernameEncrypt.innerHTML = '<i class="fas fa-check-circle" style="color:#10b981;"></i><span>Valid</span>';
                    } else {
                        usernameEncrypt.innerHTML = '<i class="fas fa-user"></i><span>Enter username</span>';
                    }
                });
            }

            // ============================================
            // FIXED: FORM SUBMISSION WITH CORRECT REDIRECT
            // ============================================
            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const username = usernameInput.value.trim();
                    const password = passwordInput.value;
                    
                    // Remove any existing error classes
                    usernameInput.classList.remove('error');
                    passwordInput.classList.remove('error');
                    
                    // Validation
                    if (!username || !password) {
                        messageEl.textContent = 'Please enter both username and password';
                        
                        if (window.dutabaraneLoader) {
                            window.dutabaraneLoader.showError('Please fill all fields', 3000);
                        }
                        
                        if (!username) usernameInput.classList.add('error');
                        if (!password) passwordInput.classList.add('error');
                        return;
                    }

                    // Clear any previous messages
                    messageEl.textContent = '';

                    // Show encryption animation
                    if (passwordEncrypt) {
                        passwordEncrypt.className = 'encryption-indicator encrypting';
                        passwordEncrypt.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Securing credentials...</span>';
                    }

                    // Start progress bar
                    if (window.dutabaraneLoader) {
                        window.dutabaraneLoader.startProgress();
                    }

                    // Add loader to button
                    let loader = { stop: () => {} };
                    if (window.dutabaraneLoader && loginButton) {
                        loader = window.dutabaraneLoader.addButtonLoader(loginButton, 'Authenticating...');
                    }

                    try {
                        // ============================================
                        // ACTUAL LOGIN API CALL - REPLACE WITH YOUR REAL ENDPOINT
                        // ============================================
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });

                        const data = await response.json();
                        
                        // Check if login was successful
                        // IMPORTANT: Adjust this based on your actual API response structure
                        if (data.success === true || data.token || data.user) {
                            
                            // Store authentication data if needed
                            if (data.token) {
                                localStorage.setItem('token', data.token);
                            }
                            
                            if (data.user) {
                                localStorage.setItem('user', JSON.stringify(data.user));
                            }
                            
                            // Store simple flag for demo
                            localStorage.setItem('isAuthenticated', 'true');
                            
                            // Update progress
                            if (window.dutabaraneLoader) {
                                window.dutabaraneLoader.updateProgress(80);
                            }
                            
                            // Show success message
                            messageEl.textContent = 'Login successful! Redirecting...';
                            
                            // Show green ellipse success animation
                            if (window.dutabaraneLoader) {
                                window.dutabaraneLoader.showLoginSuccess(() => {
                                    // ============================================
                                    // FIXED: CORRECT REDIRECT TO HOME.HTML
                                    // ============================================
                                    console.log('✅ Login successful, redirecting to home.html');
                                    window.location.href = 'home.html';  // Make sure this is correct
                                });
                                
                                // Show success toast as backup
                                window.dutabaraneLoader.showSuccess('Login successful!', 2000);
                                
                                // Complete progress
                                window.dutabaraneLoader.completeProgress();
                            } else {
                                // Fallback if loader not available
                                setTimeout(() => {
                                    window.location.href = 'home.html';
                                }, 1500);
                            }

                        } else {
                            // Login failed
                            throw new Error(data.message || 'Invalid credentials');
                        }

                    } catch (error) {
                        console.error('Login error:', error);
                        
                        // Reset encryption indicator
                        if (passwordEncrypt) {
                            passwordEncrypt.className = 'encryption-indicator encrypted';
                            passwordEncrypt.innerHTML = '<i class="fas fa-shield-alt"></i><span>AES-256 encrypted</span>';
                        }
                        
                        // Show error message
                        messageEl.textContent = error.message || 'Invalid username or password';
                        
                        // Add error class to inputs for visual feedback
                        usernameInput.classList.add('error');
                        passwordInput.classList.add('error');
                        
                        if (window.dutabaraneLoader) {
                            window.dutabaraneLoader.showError(error.message || 'Login failed!', 3000);
                            
                            // Complete progress with error
                            window.dutabaraneLoader.completeProgress();
                        }

                    } finally {
                        // Stop button loader
                        loader.stop();
                    }
                });
            }

            // ============================================
            // REMOVE ERROR CLASS ON INPUT
            // ============================================
            if (usernameInput) {
                usernameInput.addEventListener('input', function() {
                    this.classList.remove('error');
                });
            }
            
            if (passwordInput) {
                passwordInput.addEventListener('input', function() {
                    this.classList.remove('error');
                });
            }

            // ============================================
            // CHECK FOR EXISTING SESSION
            // ============================================
            // If already logged in, redirect to home
            if (localStorage.getItem('isAuthenticated') === 'true' || localStorage.getItem('token')) {
                console.log('Already authenticated, redirecting to home');
                window.location.href = 'home.html';
            }

            console.log('🔐 Dutabarane Login System Ready');
            console.log('✅ Fixed: Proper redirect to home.html');
        })();
    </script>

    <!-- Your existing script.js (optional) -->
    <script src="script.js"></script>
</body>
</html>
